<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebt Smart QR System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #071022; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-container { width: 100%; max-width: 600px; background: #1e293b; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #34a853; margin-bottom: 20px; }
        h3 { text-align: center; color:white; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; cursor: pointer; border: 2px solid #34a853; background: none; color: white; border-radius: 10px; font-weight: bold; }
        .tab-btn.active { background: #34a853; }

        .section { display: none; }
        .section.active { display: block; }

        .label-text { color: #34a853; font-size: 12px; font-weight: bold; margin: 15px 0 5px; display: block; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; font-size: 15px; box-sizing: border-box; color: #000; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px; color: white; transition: 0.3s; }
        .p-btn { background: #34a853; }
        .w-btn { background: #1a73e8; }
        .l-btn { background: #ea4335; }
        
        .qr-output { display: none; flex-direction: column; align-items: center; margin-top: 15px; padding: 15px; background: white; border-radius: 12px; }
        .dl-btn { background: #071022; margin-top: 10px; width: auto; padding: 8px 20px; font-size: 14px; }

        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid #34a853; margin-top: 10px; }
        .result-box { display: none; margin-top: 20px; background: white; color: black; padding: 15px; border-radius: 10px; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #94a3b8; border-top: 1px solid #475569; padding-top: 10px; width: 100%; }
    </style>
</head>
<body>

<div class="main-container">
    <h2>Ebt Smart QR System</h2>
    <h3>Make Your Own Qr</h3>
    
    <div class="tabs">
        <button id="tab1" class="tab-btn active" onclick="showTab('gen')">Generate</button>
        <button id="tab2" class="tab-btn" onclick="showTab('scan')">Scanner</button>
    </div>

    <div id="gen-section" class="section active">
        
        <span class="label-text">👤 Personal Identity</span>
        <input type="text" id="p_name" placeholder="Full Name">
        <input type="text" id="p_phone" placeholder="Mobile Number">
        
        <span class="label-text">🆔 Identity Type</span>
        <select id="p_id_type">
            <option value="NID">National ID (NID)</option>
            <option value="Birth Cert">Birth Certificate</option>
        </select>
        <input type="text" id="p_id_val" placeholder="Enter ID Number">

        <input type="text" id="p_addr" placeholder="Full Address">
        
        <button class="btn p-btn" onclick="genQR('personal')">Generate Personal QR</button>
        <div id="res_personal" class="qr-output">
            <div id="qr_personal"></div>
            <button class="btn dl-btn" onclick="download('qr_personal')">💾 Download Personal QR</button>
        </div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #475569;">

        <span class="label-text">📶 WiFi Smart Connect</span>
        <input type="text" id="w_ssid" placeholder="WiFi Name (SSID)">
        <input type="text" id="w_pass" placeholder="WiFi Password">
        <button class="btn w-btn" onclick="genQR('wifi')">Generate WiFi QR</button>
        <div id="res_wifi" class="qr-output">
            <div id="qr_wifi"></div>
            <button class="btn dl-btn" onclick="download('qr_wifi')">💾 Download WiFi QR</button>
        </div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #475569;">

        <span class="label-text">🌐 Web URL Link</span>
        <input type="url" id="l_url" placeholder="https://example.com">
        <button class="btn l-btn" onclick="genQR('link')">Generate Link QR</button>
        <div id="res_link" class="qr-output">
            <div id="qr_link"></div>
            <button class="btn dl-btn" onclick="download('qr_link')">💾 Download Link QR</button>
        </div>
    </div>

    <div id="scan-section" class="section">
        <span class="label-text">📁 Upload QR Image</span>
        <input type="file" id="file-input" accept="image/*" style="background: #1e293b; color: white; padding: 10px; width: 100%; border-radius: 8px;">
        <div id="reader"></div>
        <div id="res-box" class="result-box">
            <h4 style="margin:0 0 10px 0; color: #34a853;">Scanned Result:</h4>
            <p id="res-text" style="word-break: break-all; white-space: pre-wrap; font-weight: bold;"></p>
            <div id="scan-action"></div>
            <button class="btn" style="background:#071022" onclick="resetScanner()">Scan Another</button>
        </div>
    </div>

    <div class="footer">
        Designed by <strong>Md Ibrahim Khalil</strong> | &copy; 2026 <strong>EInbrainton</strong>
    </div>
</div>

<script>
    function showTab(type) {
        document.getElementById('gen-section').classList.toggle('active', type === 'gen');
        document.getElementById('scan-section').classList.toggle('active', type === 'scan');
        document.getElementById('tab1').classList.toggle('active', type === 'gen');
        document.getElementById('tab2').classList.toggle('active', type === 'scan');
        if(type === 'scan') startCam(); else stopCam();
    }

    function genQR(type) {
        let content = "";
        let targetDiv = "";
        let resArea = "";

        if(type === 'personal') {
            const name = document.getElementById('p_name').value.trim();
            const phone = document.getElementById('p_phone').value.trim();
            const idType = document.getElementById('p_id_type').value;
            const idVal = document.getElementById('p_id_val').value.trim();
            const addr = document.getElementById('p_addr').value.trim();

            if(name) content += `Name: ${name}\n`;
            if(phone) content += `Phone: ${phone}\n`;
            if(idVal) content += `${idType}: ${idVal}\n`;
            if(addr) content += `Address: ${addr}`;

            targetDiv = "qr_personal"; resArea = "res_personal";
        } 
        else if(type === 'wifi') {
            let s = document.getElementById('w_ssid').value.trim();
            let p = document.getElementById('w_pass').value.trim();
            if(s || p) content = `WIFI:S:${s};T:WPA;P:${p};;`;
            targetDiv = "qr_wifi"; resArea = "res_wifi";
        }
        else if(type === 'link') {
            content = document.getElementById('l_url').value.trim();
            targetDiv = "qr_link"; resArea = "res_link";
        }

        if(!content.trim()) return alert("Please write at least one character!");

        document.getElementById(targetDiv).innerHTML = "";
        new QRCode(document.getElementById(targetDiv), { 
            text: unescape(encodeURIComponent(content)), 
            width: 220, 
            height: 220,
            correctLevel: QRCode.CorrectLevel.L // Low density for faster scanning
        });
        document.getElementById(resArea).style.display = "flex";
        document.getElementById(resArea).scrollIntoView({behavior: 'smooth'});
    }

    function download(divId) {
        const canvas = document.querySelector(`#${divId} canvas`);
        if(!canvas) return;
        const link = document.createElement('a');
        link.download = `Ebt_SmartQR.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    let scanner;
    function startCam() {
        if(!scanner) scanner = new Html5Qrcode("reader");
        scanner.start({facingMode: "environment"}, {fps: 10, qrbox: 250}, text => handleScan(text)).catch(()=>{});
    }
    function stopCam() { if(scanner && scanner.isScanning) scanner.stop(); }

    document.getElementById('file-input').addEventListener('change', e => {
        const file = e.target.files[0];
        if(!file) return;
        new Html5Qrcode("reader").scanFile(file, true).then(text => handleScan(text)).catch(()=>alert("QR can't be read!"));
    });

    function handleScan(text) {
        stopCam();
        document.getElementById('reader').style.display = 'none';
        document.getElementById('res-box').style.display = 'block';
        document.getElementById('res-text').innerText = text;
        
        const action = document.getElementById('scan-action');
        action.innerHTML = "";
        
        if(text.toLowerCase().startsWith("http")) {
            const b = document.createElement('button');
            b.className = "btn l-btn";
            b.innerText = "🌐 Open Website Link";
            b.onclick = () => window.open(text, '_blank');
            action.appendChild(b);
        } else if(text.startsWith("WIFI:")) {
            const b = document.createElement('button');
            b.className = "btn w-btn";
            b.innerText = "📶 Connect to WiFi";
            action.appendChild(b);
        }
    }

    function resetScanner() {
        document.getElementById('res-box').style.display = 'none';
        document.getElementById('reader').style.display = 'block';
        startCam();
    }
</script>

</body>
</html>
